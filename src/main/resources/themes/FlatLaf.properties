[style].neutral=\
  focusedBorderColor:fade($color.neutral,90%);\
  focusColor:fade($color.neutral,50%);

[style].primary=\
  borderColor:fade($color.primary,70%);\
  focusedBorderColor:fade($color.primary,70%);\
  focusColor:fade($color.primary,25%);

[style].secondary=\
  borderColor:fade($color.secondary,70%);\
  focusedBorderColor:fade($color.secondary,70%);\
  focusColor:fade($color.secondary,25%);

[style].info=\
  borderColor:fade($color.info,70%);\
  focusedBorderColor:fade($color.info,70%);\
  focusColor:fade($color.info,25%);

[style].success=\
  borderColor:fade($color.success,70%);\
  focusedBorderColor:fade($color.success,70%);\
  focusColor:fade($color.success,25%);

[style].warning=\
  borderColor:fade($color.warning,70%);\
  focusedBorderColor:fade($color.warning,70%);\
  focusColor:fade($color.warning,25%);

[style].danger=\
  borderColor:fade($color.danger,70%);\
  focusedBorderColor:fade($color.danger,70%);\
  focusColor:fade($color.danger,25%);

[style].ghost=\
  focusColor:fade($color.ghost,50%);

# --- icon ---

icon.checkmarkColor.neutral=lazy(Actions.Grey)
icon.border.neutral=lazy(CheckBox.icon.borderColor)

[style].icon.style=\
  icon.borderWidth:1;\
  icon.focusedBackground:null;\
  icon.focusedSelectedBackground:null;

[style].icon.border=\
  icon.focusWidth:3;

[style].icon.neutral=\
  icon.checkmarkColor:$icon.checkmarkColor.neutral;\
  icon.selectedBackground:$color.neutral;\
  icon.focusColor:fade($color.neutral,50%);\
  icon.borderColor:$icon.border.neutral;\
  icon.hoverBorderColor:$icon.border.neutral;\
  icon.focusedBorderColor:$icon.border.neutral;\
  icon.pressedBorderColor:$icon.border.neutral;\
  icon.selectedBorderColor:$icon.border.neutral;\
  icon.hoverSelectedBorderColor:$icon.border.neutral;\
  icon.focusedSelectedBorderColor:$icon.border.neutral;\
  icon.pressedSelectedBorderColor:$icon.border.neutral;

[style].icon.primary=\
  icon.checkmarkColor:$foreground.primary;\
  icon.selectedBackground:$color.primary;\
  icon.focusColor:fade($color.primary,25%);\
  icon.borderColor:fade($color.primary,70%);\
  icon.hoverBorderColor:fade($color.primary,70%);\
  icon.focusedBorderColor:fade($color.primary,70%);\
  icon.pressedBorderColor:fade($color.primary,70%);\
