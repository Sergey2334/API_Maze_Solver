# --- Define Missing Color Variables ---
color.neutral = #555555
color.primary = #007acc
color.secondary = #6c757d
color.info = #17a2b8
color.success = #28a745
color.warning = #ffc107
color.danger = #dc3545
color.ghost = #aaaaaa
color.start = #00DD88
color.pause = #00C5DD
color.reset = #555555
color.add = #00CC55
color.remove = #CC0033

foreground.primary = #ffffff
foreground.secondary = #ffffff
foreground.info = #ffffff
foreground.success = #ffffff
foreground.warning = #000000
foreground.danger = #ffffff

# --- Increase Title Bar Height and Padding globally ---
TitlePane.titleMargins = 8,0,8,0
TitlePane.buttonSize = 44,40
TitlePane.font = bold 14

# Force FlatLaf to render the window icon inside the top title panel
TitlePane.showIcon = true
TitlePane.iconSize = 25,25

